<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Procure Lite interface overview</title>
  <desc id="desc">A GitHub preview image showing the dashboard, ledger, action queue, and mobile card view of Procure Lite.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset=".58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="blue" x1="72" y1="52" x2="1128" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="20" y="20" width="1160" height="640" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
    <style>
      .label{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;fill:#0f172a}
      .muted{fill:#64748b}
      .tiny{font-size:18px}
      .small{font-size:22px}
      .mid{font-size:26px;font-weight:700}
      .title{font-size:46px;font-weight:800}
      .white{fill:#fff}
      .card{fill:#fff;stroke:#e2e8f0;stroke-width:1.4}
    </style>
  </defs>
  <rect width="1200" height="680" rx="0" fill="url(#page)"/>
  <g filter="url(#shadow)">
    <rect x="72" y="52" width="1056" height="576" rx="34" fill="#ffffff"/>
  </g>
  <rect x="72" y="52" width="248" height="576" rx="34" fill="#0f172a"/>
  <path d="M320 52h774a34 34 0 0 1 34 34v508a34 34 0 0 1-34 34H320z" fill="#f8fafc"/>
  <g transform="translate(108 96)">
    <rect width="52" height="52" rx="14" fill="url(#blue)"/>
    <path d="M17 27h18M17 36h18M18 18l6 6 12-14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="label white mid" x="68" y="25">Procure Lite</text>
    <text class="label muted tiny" x="68" y="51" fill="#94a3b8">采购台账工作台</text>
  </g>
  <g class="label small" transform="translate(112 194)">
    <rect x="-12" y="-26" width="176" height="48" rx="12" fill="#1d4ed8"/>
    <text class="white" y="6">控制台</text>
    <text y="70" fill="#cbd5e1">采购台账</text>
    <text y="134" fill="#cbd5e1">执行看板</text>
    <text y="198" fill="#cbd5e1">运营中心</text>
    <text y="262" fill="#cbd5e1">统计报表</text>
    <text y="326" fill="#cbd5e1">审计日志</text>
  </g>
  <g transform="translate(366 96)">
    <text class="label title" y="0" dominant-baseline="hanging">采购执行驾驶舱</text>
    <text class="label muted small" x="0" y="62">OCR 导入、台账跟踪、行动队列和备份恢复集中在同一个自托管 Web 应用里。</text>
  </g>
  <g transform="translate(366 190)">
    <rect class="card" width="162" height="112" rx="18"/>
    <text class="label tiny muted" x="24" y="36">待采购</text>
    <text class="label" x="24" y="82" font-size="42" font-weight="800">18</text>
    <rect x="120" y="28" width="24" height="56" rx="12" fill="#dbeafe"/>
    <rect x="120" y="52" width="24" height="32" rx="12" fill="#2563eb"/>
  </g>
  <g transform="translate(550 190)">
    <rect class="card" width="162" height="112" rx="18"/>
    <text class="label tiny muted" x="24" y="36">待到货</text>
    <text class="label" x="24" y="82" font-size="42" font-weight="800">9</text>
    <circle cx="130" cy="62" r="25" fill="#fef3c7"/>
    <path d="M118 63h24M130 51v24" stroke="#d97706" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(734 190)">
    <rect class="card" width="162" height="112" rx="18"/>
    <text class="label tiny muted" x="24" y="36">待分发</text>
    <text class="label" x="24" y="82" font-size="42" font-weight="800">6</text>
    <path d="M121 42l28 16v32l-28 16-28-16V58z" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <path d="M93 58l28 16 28-16M121 74v32" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(918 190)">
    <rect class="card" width="162" height="112" rx="18"/>
    <text class="label tiny muted" x="24" y="36">待报销</text>
    <text class="label" x="24" y="82" font-size="42" font-weight="800">4</text>
    <rect x="106" y="38" width="42" height="52" rx="8" fill="#fee2e2"/>
    <path d="M116 54h22M116 68h22M116 82h15" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(366 334)">
    <rect class="card" width="498" height="220" rx="20"/>
    <text class="label mid" x="26" y="42">最近台账</text>
    <text class="label tiny muted" x="388" y="42">在线编辑</text>
    <g transform="translate(26 68)">
      <rect width="446" height="38" rx="10" fill="#f1f5f9"/>
      <text class="label tiny muted" x="18" y="25">单号</text>
      <text class="label tiny muted" x="118" y="25">物品</text>
      <text class="label tiny muted" x="262" y="25">状态</text>
      <text class="label tiny muted" x="354" y="25">供应商</text>
      <g class="label tiny">
        <text x="18" y="76">REC-248</text><text x="118" y="76">硒鼓</text><text x="262" y="76">待到货</text><text x="354" y="76">办公优选</text>
        <line x1="0" y1="94" x2="446" y2="94" stroke="#e2e8f0"/>
        <text x="18" y="126">REC-249</text><text x="118" y="126">显示器</text><text x="262" y="126">待分发</text><text x="354" y="126">数码仓</text>
      </g>
    </g>
  </g>
  <g transform="translate(894 334)">
    <rect width="186" height="270" rx="28" fill="#111827"/>
    <rect x="13" y="15" width="160" height="240" rx="22" fill="#f8fafc"/>
    <text class="label tiny" x="32" y="54" font-weight="700">移动卡片</text>
    <g transform="translate(28 76)">
      <rect width="130" height="70" rx="14" fill="#fff" stroke="#e2e8f0"/>
      <text class="label" x="14" y="27" font-size="15" font-weight="700">采购单 REC-249</text>
      <rect x="14" y="40" width="54" height="18" rx="9" fill="#dbeafe"/>
      <text class="label" x="23" y="54" font-size="12" fill="#1d4ed8">待分发</text>
    </g>
    <g transform="translate(28 158)">
      <rect width="130" height="70" rx="14" fill="#fff" stroke="#e2e8f0"/>
      <text class="label" x="14" y="27" font-size="15" font-weight="700">报销附件</text>
      <rect x="14" y="40" width="54" height="18" rx="9" fill="#dcfce7"/>
      <text class="label" x="23" y="54" font-size="12" fill="#15803d">已提交</text>
    </g>
