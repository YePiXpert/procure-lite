  <g transform="translate(366 578)">
    <rect width="498" height="26" rx="13" fill="#e2e8f0"/>
    <rect width="324" height="26" rx="13" fill="#14b8a6"/>
    <text class="label tiny muted" x="0" y="58">从导入到分发、报销、审计和备份的轻量闭环</text>
  </g>
</svg>
