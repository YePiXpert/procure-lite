<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Procure Lite data lifecycle</title>
  <desc id="desc">A GitHub README diagram showing how receipts move through OCR import, review, procurement execution, reports, audit, and backup.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset=".58" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f7fb"/>
    </linearGradient>
    <filter id="shadow" x="30" y="42" width="1140" height="420" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity=".11"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#2563eb"/>
    </marker>
    <style>
      .t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;fill:#0f172a}
      .muted{fill:#64748b}
      .title{font-size:40px;font-weight:800}
      .node-title{font-size:21px;font-weight:800}
      .node-copy{font-size:15px;fill:#64748b}
      .badge{font-size:14px;font-weight:800;letter-spacing:0;fill:#1d4ed8}
      .box{fill:#fff;stroke:#e2e8f0;stroke-width:1.5}
      .lane{fill:#f8fafc;stroke:#dbeafe;stroke-width:1.5}
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text class="t title" x="70" y="70">端到端数据生命周期</text>
  <text class="t muted" x="70" y="106" font-size="20">从单据进入系统，到台账、执行、分析、审计和备份，所有关键数据都留在自托管环境内。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="145" width="1060" height="300" rx="30" fill="#fff" stroke="#e2e8f0"/>
  </g>

  <g transform="translate(108 185)">
    <rect class="lane" x="0" y="0" width="156" height="206" rx="22"/>
    <circle cx="78" cy="56" r="34" fill="#dbeafe"/>
    <path d="M64 40h24l12 13v32H64zM88 40v14h12" fill="none" stroke="#2563eb" stroke-width="5" stroke-linejoin="round"/>
    <text class="t badge" x="42" y="116">IMPORT</text>
    <text class="t node-title" x="35" y="146">上传单据</text>
    <text class="t node-copy" x="30" y="174">PDF / 图片</text>
  </g>
  <path d="M276 288h72" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(354 185)">
    <rect class="lane" x="0" y="0" width="156" height="206" rx="22"/>
    <circle cx="78" cy="56" r="34" fill="#ccfbf1"/>
    <path d="M57 56h42M78 35v42M62 40l32 32M94 40 62 72" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
    <text class="t badge" x="49" y="116" fill="#0f766e">OCR</text>
    <text class="t node-title" x="35" y="146">字段识别</text>
    <text class="t node-copy" x="24" y="174">流水 / 部门 / 明细</text>
  </g>
  <path d="M522 288h72" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(600 185)">
    <rect class="lane" x="0" y="0" width="156" height="206" rx="22"/>
    <circle cx="78" cy="56" r="34" fill="#eef2ff"/>
    <path d="M58 42h40M58 56h40M58 70h26" stroke="#4f46e5" stroke-width="5" stroke-linecap="round"/>
    <path d="M54 31h48a8 8 0 0 1 8 8v42a8 8 0 0 1-8 8H54a8 8 0 0 1-8-8V39a8 8 0 0 1 8-8z" fill="none" stroke="#4f46e5" stroke-width="5"/>
    <text class="t badge" x="43" y="116" fill="#4f46e5">LEDGER</text>
    <text class="t node-title" x="35" y="146">确认台账</text>
    <text class="t node-copy" x="31" y="174">补齐并沉淀记录</text>
  </g>
  <path d="M768 288h72" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(846 185)">
    <rect class="lane" x="0" y="0" width="156" height="206" rx="22"/>
    <circle cx="78" cy="56" r="34" fill="#fef3c7"/>
    <path d="M53 62h18l9-20 14 36 7-16h20" fill="none" stroke="#d97706" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="t badge" x="35" y="116" fill="#b45309">EXECUTE</text>
    <text class="t node-title" x="35" y="146">执行闭环</text>
    <text class="t node-copy" x="24" y="174">下单 / 到货 / 分发</text>
  </g>

  <path d="M925 400v42c0 24-18 40-44 40H319c-26 0-44-16-44-40v-42" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 10"/>
  <path d="M275 400v42c0 24 18 40 44 40h562c26 0 44-16 44-40v-42" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 10"/>

  <g transform="translate(143 398)">
    <rect class="box" x="0" y="0" width="190" height="82" rx="18"/>
    <circle cx="36" cy="41" r="18" fill="#dcfce7"/>
    <path d="M27 41l7 7 14-16" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="t node-title" x="66" y="34">统计报表</text>
    <text class="t node-copy" x="66" y="58">金额、效率、供应商</text>
  </g>
  <g transform="translate(505 398)">
    <rect class="box" x="0" y="0" width="190" height="82" rx="18"/>
    <circle cx="36" cy="41" r="18" fill="#fee2e2"/>
    <path d="M27 30h18v25H27zM31 37h10M31 45h10" fill="none" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
    <text class="t node-title" x="66" y="34">审计日志</text>
    <text class="t node-copy" x="66" y="58">变更可追溯</text>
  </g>
  <g transform="translate(867 398)">
    <rect class="box" x="0" y="0" width="190" height="82" rx="18"/>
    <circle cx="36" cy="41" r="18" fill="#e0f2fe"/>
    <path d="M27 43a16 16 0 1 0 6-12M27 27v16h16" fill="none" stroke="#0284c7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="t node-title" x="66" y="34">备份恢复</text>
    <text class="t node-copy" x="66" y="58">本机 zip / WebDAV</text>
  </g>
</svg>
