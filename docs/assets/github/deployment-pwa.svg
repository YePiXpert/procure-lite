<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">Deployment and PWA architecture</title>
  <desc id="desc">A deployment diagram showing browser and PWA clients connecting through HTTPS to a VPS Docker service with FastAPI, Vue, SQLite, uploads, local backups, and WebDAV backups.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".48" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <filter id="shadow" x="40" y="34" width="1120" height="400" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#0f766e"/>
    </marker>
    <style>
      .t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;fill:#0f172a}
      .muted{fill:#64748b}
      .title{font-size:40px;font-weight:800}
      .h{font-size:24px;font-weight:800}
      .p{font-size:17px;fill:#64748b}
      .chip{font-size:15px;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>
  <text class="t title" x="72" y="72">VPS Docker 部署与 PWA 访问</text>
  <text class="t muted" x="72" y="108" font-size="20">一台 Linux VPS 承载服务，电脑和手机通过同一个 HTTPS 地址访问同一份数据。</text>
  <g filter="url(#shadow)">
    <rect x="72" y="152" width="276" height="224" rx="28" fill="#fff" stroke="#e2e8f0"/>
    <rect x="456" y="132" width="332" height="264" rx="30" fill="#0f172a"/>
    <rect x="872" y="152" width="256" height="224" rx="28" fill="#fff" stroke="#e2e8f0"/>
  </g>
  <g transform="translate(108 190)">
    <text class="t h" x="0" y="0">浏览器 / PWA</text>
    <text class="t p" x="0" y="36">桌面端、手机端、主屏幕入口</text>
    <rect x="0" y="66" width="92" height="126" rx="16" fill="#111827"/>
    <rect x="9" y="15" width="74" height="100" rx="11" fill="#f8fafc"/>
    <rect x="118" y="78" width="118" height="82" rx="14" fill="#dbeafe"/>
    <path d="M146 108h62M146 130h42" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <text class="t chip" x="0" y="222" fill="#1d4ed8">在线业务操作</text>
  </g>
  <path d="M352 264h96" stroke="#0f766e" stroke-width="5" marker-end="url(#arrow)"/>
  <text class="t chip" x="375" y="242" fill="#0f766e">HTTPS</text>
  <g transform="translate(500 172)">
    <text class="t h" x="0" y="0" fill="#fff">VPS Docker</text>
    <text class="t p" x="0" y="36" fill="#cbd5e1">FastAPI 后端 + Vue 静态前端</text>
    <g transform="translate(0 70)">
      <rect width="124" height="56" rx="14" fill="#1d4ed8"/>
      <text class="t chip" x="24" y="35" fill="#fff">FastAPI</text>
      <rect x="144" width="124" height="56" rx="14" fill="#14b8a6"/>
      <text class="t chip" x="188" y="35" fill="#fff">Vue</text>
      <rect y="80" width="268" height="62" rx="16" fill="#1e293b" stroke="#334155"/>
      <text class="t chip" x="22" y="118" fill="#e2e8f0">PaddleOCR 本地解析，无需 API Key</text>
    </g>
  </g>
  <path d="M790 264h76" stroke="#0f766e" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(908 190)">
    <text class="t h" x="0" y="0">持久化数据</text>
    <text class="t p" x="0" y="36">SQLite、上传文件、备份目录</text>
    <g transform="translate(0 70)">
      <rect width="178" height="34" rx="17" fill="#f1f5f9"/>
      <text class="t chip" x="20" y="23">procure-lite-state/</text>
      <rect y="52" width="178" height="34" rx="17" fill="#dcfce7"/>
      <text class="t chip" x="20" y="75" fill="#15803d">本地 zip 备份</text>
      <rect y="104" width="178" height="34" rx="17" fill="#dbeafe"/>
      <text class="t chip" x="20" y="127" fill="#1d4ed8">WebDAV 云备份</text>
    </g>
  </g>
  <g transform="translate(456 424)">
    <rect width="332" height="38" rx="19" fill="#fff" stroke="#e2e8f0"/>
    <text class="t" x="26" y="25" font-size="16" fill="#64748b">离线只缓存应用壳；OCR、台账和备份仍需连接服务器</text>
  </g>
</svg>
