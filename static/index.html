<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>办公用品采购系统 | Procurement Management</title>
    <script src="/static/vendor/tailwindcss-cdn.js"></script>
    <script src="/static/vendor/vue.global.prod.js"></script>
    <script src="/static/vendor/axios.min.js"></script>
    <link rel="stylesheet" href="/static/app.css?v=1.2.49">
        <style>
            .toast-enter-active,
            .toast-leave-active {
                transition: opacity 0.2s ease, transform 0.2s ease;
            }

            .toast-enter-from,
            .toast-leave-to {
                opacity: 0;
                transform: translate3d(18px, -6px, 0) scale(0.98);
            }

            .toast-move {
                transition: transform 0.2s ease;
            }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
            .animate-scan {
                animation: scan 2s ease-in-out infinite;
            }

            @media (prefers-reduced-motion: reduce) {
                .toast-enter-active,
                .toast-leave-active,
                .toast-move {
                    transition: none !important;
                }
            }
        </style>
</head>
    <body class="flex h-screen w-full bg-slate-50 overflow-hidden text-slate-900">
    <div id="app" class="flex h-screen w-full overflow-hidden" style="display:none;">
        <input type="file" ref="fileInput" @change="handleFileSelect" accept=".pdf,.png,.jpg,.jpeg,.jfif" class="hidden">
        <input type="file" ref="restoreInput" @change="handleRestoreSelect" accept=".zip" class="hidden">

        <template v-if="isAuthenticated">
        <aside class="w-64 shrink-0 bg-white border-r border-slate-200 flex flex-col">
            <div class="h-16 px-5 border-b border-slate-200 flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-blue-600 flex items-center justify-center text-white shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/></svg>
                </div>
                <div>
                    <div class="text-sm font-semibold text-slate-900">办公用品采购系统</div>
                    <div class="text-[11px] text-slate-500">Admin Dashboard</div>
                </div>
            </div>
            <div class="flex-1 min-h-0 flex flex-col">
                <nav class="flex-1 min-h-0 overflow-y-auto p-3">
                    <div class="space-y-1">
                        <div v-for="view in navPrimaryViews" :key="view.id" class="space-y-1">
                            <button
                                @click="switchView(view.id)"
                                :class="currentView === view.id ? 'sidebar-nav-active font-semibold' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'"
                                class="w-full h-10 px-3 pl-4 rounded-lg text-left text-sm font-medium transition-all duration-200 ease-in-out"
                            >
                                {{ view.icon }} {{ view.label }}
                            </button>

                            <div
                                v-if="currentView === view.id && currentViewHasSubViews"
                                class="ml-4 space-y-1 border-l border-slate-200 pl-3 pb-2"
                            >
                                <button
                                    v-for="subview in currentViewSidebarSubViews"
                                    :key="`${view.id}-submenu-${subview.id}`"
                                    @click="switchSubView(subview.id)"
                                    :class="subview.isActive ? 'bg-blue-600 text-white shadow-sm' : 'bg-white text-slate-600 hover:bg-slate-100'"
                                    class="w-full rounded-xl px-3 py-2.5 text-left text-sm font-medium transition-all duration-200 ease-in-out"
                                >
                                    <div class="flex items-center justify-between gap-3">
                                        <span>{{ subview.label }}</span>
                                        <span
                                            v-if="subview.badgeLabel"
                                            :class="subview.isActive ? 'bg-white/20 text-white' : 'bg-slate-100 text-slate-600'"
                                            class="inline-flex min-w-[1.8rem] items-center justify-center rounded-full px-2 py-0.5 text-[11px] font-semibold"
                                        >
                                            {{ subview.badgeLabel }}
                                        </span>
                                    </div>
                                    <div v-if="subview.isActive && subview.description" class="mt-1 text-[11px] leading-5 text-blue-100">
                                        {{ subview.description }}
                                    </div>
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
                <div class="p-3 border-t border-slate-200">
                    <button
                        v-for="view in navSecondaryViews"
                        :key="view.id"
                        @click="switchView(view.id)"
                        :class="currentView === view.id ? 'sidebar-nav-active font-semibold' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'"
                        class="w-full h-10 px-3 pl-4 rounded-lg text-left text-sm font-medium transition-all duration-200 ease-in-out"
                    >
                        {{ view.icon }} {{ view.label }}
                    </button>
                    <button @click="authLogout(true)"
                            class="mt-2 w-full h-10 px-3 rounded-lg text-left text-sm font-medium text-slate-600 hover:bg-slate-50 transition-all duration-200 ease-in-out">
                        🚪 退出登录
                    </button>
                    <div class="mt-2 px-3 text-[11px] text-slate-400">版本 v{{ appVersion }}</div>
                </div>
            </div>
        </aside>

        <div class="flex-1 min-w-0 flex flex-col">
            <header class="bg-white border-b border-slate-200">
                <div class="px-6 py-4">
                    <div class="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
                        <div class="min-w-0">
                            <div class="flex flex-wrap items-center gap-2 text-xs uppercase tracking-wide text-slate-400">
                                <span>{{ currentViewMeta.label || currentViewMeta.title }}</span>
                                <span v-if="currentViewHasSubViews">/</span>
                                <span v-if="currentViewHasSubViews" class="text-slate-500">{{ currentSubViewMeta.label }}</span>
                            </div>
                            <div class="mt-1 text-lg font-semibold text-slate-900">
                                {{ currentSubViewMeta.title || currentViewMeta.title }}
                            </div>
                            <p v-if="currentSubViewMeta.description" class="mt-1 max-w-3xl text-sm text-slate-500">
                                {{ currentSubViewMeta.description }}
                            </p>
                        </div>
                        <div v-if="currentViewSearchEnabled" class="w-full xl:w-[360px]">
                            <div class="flex items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">
                                <svg class="h-4 w-4 shrink-0 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 110-15 7.5 7.5 0 010 15z"/>
                                </svg>
                                <input
                                    :value="currentViewSearchQuery"
                                    @input="setCurrentViewSearch($event.target.value)"
                                    :placeholder="currentViewSearchPlaceholder"
                                    class="h-8 flex-1 bg-transparent text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none"
                                >
                                <button
                                    v-if="currentViewSearchQuery"
                                    type="button"
                                    @click="clearCurrentViewSearch()"
                                    class="inline-flex h-7 items-center rounded-lg px-2 text-xs font-medium text-slate-500 hover:bg-white hover:text-slate-700 transition-all duration-200 ease-in-out"
                                >
                                    清空
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </header>

            <main class="flex-1 min-h-0 p-6 overflow-hidden">
                <section v-if="currentView === 'dashboard'" class="dashboard-pane view-pane h-full overflow-y-auto space-y-6 pr-1">
                    <div class="dashboard-hero">
                        <div class="dashboard-hero-copy">
                            <div class="dashboard-eyebrow">采购概览</div>
                            <h2 class="dashboard-hero-title">办公用品采购的统一总览</h2>
                            <p class="dashboard-hero-description">从台账数量、发票进度到当前待办，一屏掌握采购执行状态。</p>
                        </div>
                        <div class="dashboard-hero-summary">
                            <div class="dashboard-summary-label">当前采购总量</div>
                            <div class="dashboard-summary-value">{{ stats.total }}</div>
                            <div class="dashboard-summary-meta">含待采购、待到货、待分发与已分发记录</div>
                        </div>
                    </div>

                    <div class="dashboard-grid">
                        <div class="dashboard-card dashboard-card-accent">
                            <div class="dashboard-card-label">待采购申请</div>
                            <div class="dashboard-card-value">{{ stats.statusCount['待采购'] || 0 }}</div>
                            <div class="dashboard-card-meta">等待采购下单的记录数</div>
                        </div>
                        <div class="dashboard-card">
                            <div class="dashboard-card-label">待到货</div>
                            <div class="dashboard-card-value">{{ stats.statusCount['待到货'] || 0 }}</div>
                            <div class="dashboard-card-meta">已下单，等待收货确认</div>
                        </div>
                        <div class="dashboard-card">
                            <div class="dashboard-card-label">已开具发票</div>
                            <div class="dashboard-card-value">{{ stats.invoiceCount.issued }}</div>
                            <div class="dashboard-card-meta">可继续跟进付款与报销</div>
                        </div>
                        <div class="dashboard-card">
                            <div class="dashboard-card-label">已完成报销</div>
                            <div class="dashboard-card-value">{{ stats.paymentCount['已报销'] || 0 }}</div>
                            <div class="dashboard-card-meta">当前已闭环的付款记录</div>
                        </div>
                    </div>

                    <div class="dashboard-content-grid">
                        <div class="dashboard-panel">
                            <div class="dashboard-panel-header">
                                <div>
                                    <div class="dashboard-panel-title">状态分布</div>
                                    <div class="dashboard-panel-subtitle">采购流转当前停留位置</div>
                                </div>
                            </div>
                            <div class="dashboard-status-list">
                                <div class="dashboard-status-item">
                                    <div class="dashboard-status-copy">
                                        <span class="dashboard-status-dot dashboard-status-dot-amber"></span>
                                        <span>待采购</span>
                                    </div>
                                    <span class="dashboard-status-value">{{ stats.statusCount['待采购'] || 0 }}</span>
                                </div>
                                <div class="dashboard-status-item">
                                    <div class="dashboard-status-copy">
                                        <span class="dashboard-status-dot dashboard-status-dot-blue"></span>
                                        <span>待到货</span>
                                    </div>
                                    <span class="dashboard-status-value">{{ stats.statusCount['待到货'] || 0 }}</span>
                                </div>
                                <div class="dashboard-status-item">
                                    <div class="dashboard-status-copy">
                                        <span class="dashboard-status-dot dashboard-status-dot-violet"></span>
                                        <span>待分发</span>
                                    </div>
                                    <span class="dashboard-status-value">{{ stats.statusCount['待分发'] || 0 }}</span>
                                </div>
                                <div class="dashboard-status-item">
                                    <div class="dashboard-status-copy">
                                        <span class="dashboard-status-dot dashboard-status-dot-emerald"></span>
                                        <span>已分发</span>
                                    </div>
                                    <span class="dashboard-status-value">{{ stats.statusCount['已分发'] || 0 }}</span>
                                </div>
                            </div>
                        </div>

                        <div class="dashboard-panel">
                            <div class="dashboard-panel-header">
                                <div>
                                    <div class="dashboard-panel-title">最近新增台账</div>
                                    <div class="dashboard-panel-subtitle">按记录 ID 倒序展示最近 5 条</div>
                                </div>
                            </div>
                            <div v-if="latestItems.length" class="dashboard-recent-list">
                                <div v-for="item in latestItems" :key="`recent-${item.id}`" class="dashboard-recent-item">
                                    <div class="dashboard-recent-main">
                                        <div class="dashboard-recent-name">{{ item.item_name || '未命名物品' }}</div>
                                        <div class="dashboard-recent-meta">{{ item.department || '未分配部门' }} · {{ item.handler || '未登记经办人' }}</div>
                                    </div>
                                    <div class="dashboard-recent-side">
                                        <div class="dashboard-recent-serial">{{ item.serial_number || `REC-${item.id}` }}</div>
                                        <div class="dashboard-recent-status">{{ item.status || '-' }}</div>
                                    </div>
                                </div>
                            </div>
                            <div v-else class="dashboard-recent-empty">当前还没有可展示的台账记录</div>
                        </div>
                    </div>
                </section>

                <section v-else-if="currentView === 'ledger'" class="view-pane h-full min-h-0 flex flex-col gap-3">
                    <ledger-filter-panel
                        :filter-keyword="filterKeyword"
                        :filter-status="filterStatus"
                        :filter-department="filterDepartment"
                        :filter-month="filterMonth"
                        :statuses="statuses"
                        :departments="departments"
                        @update:filter-keyword="filterKeyword = $event"
                        @update:filter-status="filterStatus = $event"
                        @update:filter-department="filterDepartment = $event"
                        @update:filter-month="filterMonth = $event"
                        @import-docs="$refs.fileInput && $refs.fileInput.click()"
                        @add-item="openAddModal"
                        @export-excel="exportExcel"
                        @search="handleFilter"
                        @clear-filters="clearFilters"
                    ></ledger-filter-panel>

                    <ledger-batch-toolbar
                        v-if="selectedItems.length"
                        :selected-count="selectedItems.length"
                        :batch-edit-field="batchEditField"
                        :batch-edit-value="batchEditValue"
                        :statuses="statuses"
                        :payment-statuses="paymentStatuses"
                        @update:batch-edit-field="batchEditField = $event"
                        @update:batch-edit-value="batchEditValue = $event"
                        @field-change="onBatchFieldChange"
                        @apply-update="batchUpdate"
                        @batch-delete="batchDelete"
                    ></ledger-batch-toolbar>

                    <div class="flex-1 min-h-0 bg-white shadow-sm ring-1 ring-slate-900/5 rounded-xl overflow-hidden flex flex-col">
                        <ledger-table-panel
                            :items="items"
                            :selected-items="selectedItems"
                            :select-all="selectAll"
                            :focused-ledger-item-id="focusedLedgerItemId"
                            :statuses="statuses"
                            :payment-statuses="paymentStatuses"
                            :page-range-start="pageRangeStart"
                            :page-range-end="pageRangeEnd"
                            :total-items="totalItems"
                            :page-size="pageSize"
                            :page-size-options="pageSizeOptions"
                            :current-page="currentPage"
                            :page-tokens="pageTokens"
                            :total-pages="totalPages"
                            :jump-page="jumpPage"
                            @update:selected-items="selectedItems = $event"
                            @update:select-all="selectAll = $event"
                            @update:page-size="pageSize = $event"
                            @update:jump-page="jumpPage = $event"
                        ></ledger-table-panel>
                    </div>

                </section>

                <section v-else-if="currentView === 'execution'" class="view-pane h-full min-h-0 flex flex-col gap-4">
                    <div class="execution-hero shrink-0">
                        <div class="min-w-0">
                            <div class="execution-eyebrow">Execution Board</div>
                            <h2 class="execution-title">采购执行看板</h2>
                            <p class="execution-description">聚焦待采购、待到货、待分发三段队列，支持筛选、拖拽流转和关键日期闭环。</p>
                        </div>
                        <div class="execution-kpi-grid">
                            <div class="execution-kpi-card">
                                <div class="execution-kpi-label">当前待办</div>
                                <div class="execution-kpi-value">{{ executionBoardOpenTotal }}</div>
                                <div class="execution-kpi-meta">三段执行队列合计</div>
                            </div>
                            <div class="execution-kpi-card">
                                <div class="execution-kpi-label">本页展示</div>
                                <div class="execution-kpi-value">{{ executionBoardShownTotal }}</div>
                                <div class="execution-kpi-meta">受筛选与列上限影响</div>
                            </div>
                            <div class="execution-kpi-card">
                                <div class="execution-kpi-label">已分发率</div>
                                <div class="execution-kpi-value">{{ executionBoardCompletionRatio.toFixed(0) }}%</div>
                                <div class="execution-kpi-meter"><span :style="{ width: `${executionBoardCompletionRatio.toFixed(2)}%` }"></span></div>
                            </div>
                        </div>
                    </div>

                    <div class="execution-filter-bar shrink-0">
                        <label class="execution-filter-search">
                            <svg class="execution-filter-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                            <input v-model="boardKeyword" @keyup.enter="applyExecutionFilter" class="execution-filter-control execution-filter-control-search" placeholder="搜索物品、编号、经办人或采购链接">
                        </label>
                        <select v-model="boardDepartment" @change="applyExecutionFilter" class="execution-filter-control">
                            <option value="">全部部门</option>
                            <option v-for="department in departments" :key="`board-dep-${department}`" :value="department">{{ department }}</option>
                        </select>
                        <input type="month" v-model="boardMonth" @change="applyExecutionFilter" class="execution-filter-control">
                        <button @click="applyExecutionFilter" :disabled="executionLoading" class="execution-filter-button execution-filter-primary">刷新看板</button>
                        <button @click="clearExecutionFilter" :disabled="executionLoading || !executionBoardFilterActive" class="execution-filter-button">清除筛选</button>
                    </div>

                    <div class="flex-1 min-h-0 overflow-auto pr-1">
                        <div v-if="executionLoading" class="h-full min-h-[360px] flex flex-col items-center justify-center text-slate-500">
                            <svg class="w-6 h-6 animate-spin text-blue-600" viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" class="opacity-25"></circle>
                                <path d="M21 12a9 9 0 00-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                            </svg>
                            <p class="mt-3 text-sm font-medium">执行看板加载中...</p>
                        </div>
                        <div v-else class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 min-h-full">
                            <div
                                v-for="(column, columnIdx) in executionBoardColumns"
                                :key="column.key"
                                :class="{
                                    'ring-2 ring-blue-300 bg-blue-50/40': executionDropTargetKey === column.key
                                }"
                                class="execution-column min-h-0 min-w-0 flex flex-col transition-all duration-150"
                            >
                                <div class="execution-column-header">
                                    <div class="min-w-0">
                                        <span
                                            :class="{
                                            'bg-amber-100 text-amber-700 border-amber-200': column.key === 'pending_purchase',
                                            'bg-blue-100 text-blue-700 border-blue-200': column.key === 'pending_arrival',
                                            'bg-violet-100 text-violet-700 border-violet-200': column.key === 'pending_distribution'
                                        }"
                                            class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold border"
                                        >
                                            <span class="relative flex h-1.5 w-1.5 mr-1.5">
                                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" :class="statusPingClass(column.status)"></span>
                                                <span class="relative inline-flex rounded-full h-1.5 w-1.5" :class="statusDotClass(column.status)"></span>
                                            </span>
                                            {{ column.label }}
                                        </span>
                                        <div class="mt-2 text-[11px] text-slate-500">第 {{ columnIdx + 1 }} 阶段 · 拖拽卡片即可流转</div>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-2xl font-bold font-mono text-slate-900">{{ column.count }}</div>
                                        <div class="text-[10px] text-slate-400 uppercase">Items</div>
                                    </div>
                                </div>
                                <div class="px-4 pb-3">
                                    <div class="h-1.5 rounded-full bg-slate-100 overflow-hidden">
                                        <div class="h-full rounded-full bg-gradient-to-r from-blue-600 to-cyan-400 report-animate-x" :style="{ width: `${executionBoardOpenTotal > 0 ? Math.max(4, (Number(column.count) || 0) / executionBoardOpenTotal * 100) : 0}%` }"></div>
                                    </div>
                                </div>
                                <div
                                    class="flex-1 overflow-y-auto p-3 space-y-3"
                                    @dragover.prevent="onExecutionDragOver($event, column)"
                                    @dragenter.prevent="onExecutionDragEnter(column)"
                                    @dragleave="onExecutionDragLeave($event, column)"
                                    @drop.prevent="onExecutionDrop($event, column)"
                                >
                                    <div
                                        v-for="item in column.items"
                                        :key="item.id"
                                        :draggable="!executionLoading"
                                        @dragstart="onExecutionDragStart($event, item, column)"
                                        @dragend="onExecutionDragEnd"
                                        :class="{
                                            'execution-card-dragging': draggingExecutionId === item.id,
                                            'execution-card-draggable': !executionLoading
                                        }"
                                        class="execution-card"
                                    >
                                        <div class="flex items-start justify-between gap-2">
                                            <div class="min-w-0">
                                                <div class="text-[11px] font-semibold text-slate-700 font-mono truncate" :title="item.serial_number || ''">{{ item.serial_number || '-' }}</div>
                                                <div class="text-[11px] text-slate-500 truncate">{{ item.department || '未分配部门' }} · {{ item.handler || '未登记经办人' }}</div>
                                            </div>
                                            <a v-if="item.purchase_link" :href="item.purchase_link" target="_blank" class="inline-flex items-center justify-center h-7 w-7 rounded-md text-slate-400 hover:text-blue-600 hover:bg-slate-50 transition-colors duration-200" title="打开采购链接">
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                            </a>
                                        </div>
                                        <div class="text-sm font-semibold text-slate-900 leading-snug truncate" :title="item.item_name || ''">{{ item.item_name || '未命名物品' }}</div>
                                        <div class="execution-card-chips">
                                            <span>申请 {{ item.request_date || '-' }}</span>
                                            <span>{{ executionCardAgeText(item, column) }}</span>
                                            <span class="font-mono">x{{ item.quantity }}</span>
                                            <span v-if="item.unit_price !== null && item.unit_price !== undefined && item.unit_price !== ''" class="font-mono">¥ {{ formatCurrency(item.unit_price) }}</span>
                                        </div>

                                        <div v-if="column.key === 'pending_purchase'" class="pt-1">
                                            <button @click="moveToPendingArrival(item)" class="execution-action-button">一键流转至待到货</button>
                                        </div>

                                        <span class="font-mono text-slate-700">{{ item.quantity }}</span>
                                        <svg class="w-3.5 h-3.5 text-gray-300 opacity-0 group-hover:opacity-100 group-hover:text-blue-500 transition-all duration-150" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536M9 13l6.232-6.232a2.5 2.5 0 013.536 3.536L12.536 16.536a4 4 0 01-1.789 1.05L8 18l.414-2.747A4 4 0 019.464 13.464z"/>
                                        </svg>
                                    </button>
                                </div>
                            </td>
                            <td class="px-4 py-3 text-center align-middle">
                                <div class="flex items-center justify-center">
                                    <div v-if="$root.isInlineEditing(item.id, 'unit_price')" class="inline-flex">
                                        <input
                                            :ref="(el) => $root.setInlineEditRef(item.id, 'unit_price', el)"
                                            type="number"
                                            step="0.01"
                                            v-model.number="item.unit_price"
                                            @keydown.enter.prevent="$root.commitInlineEdit(item, 'unit_price')"
                                            @keydown.esc.prevent="$root.cancelInlineEdit()"
                                            @blur="$root.commitInlineEdit(item, 'unit_price')"
                                            class="h-7 w-24 px-2 text-right text-xs font-mono text-slate-700 bg-white border border-blue-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500/20"
                                        >
                                    </div>
                                    <button v-else @click="$root.startInlineEdit(item.id, 'unit_price')" type="button" class="group inline-flex items-center gap-1 rounded-md px-2 py-1 hover:bg-slate-100 transition-colors duration-150">
                                        <span class="font-mono text-slate-700">{{ item.unit_price === null || item.unit_price === undefined ? '-' : $root.formatCurrency(item.unit_price) }}</span>
                                        <svg class="w-3.5 h-3.5 text-gray-300 opacity-0 group-hover:opacity-100 group-hover:text-blue-500 transition-all duration-150" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536M9 13l6.232-6.232a2.5 2.5 0 013.536 3.536L12.536 16.536a4 4 0 01-1.789 1.05L8 18l.414-2.747A4 4 0 019.464 13.464z"/>
                                        </svg>
                                    </button>
                                </div>
                            </td>
                            <td class="px-4 py-3 text-center align-middle">
                                <div class="flex items-center justify-center">
                                    <div class="relative inline-flex items-center group">
                                        <span v-if="$root.isStatusBreathing(item.status)" class="absolute left-1.5 flex h-1.5 w-1.5 pointer-events-none">
                                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" :class="$root.statusPingClass(item.status)"></span>
                                            <span class="relative inline-flex rounded-full h-1.5 w-1.5" :class="$root.statusDotClass(item.status)"></span>
                                        </span>
                                        <select :value="$root.normalizeProcurementStatus(item.status)" @change="$root.handleLedgerStatusChange(item, $event.target.value)"
                                                :class="$root.statusSelectClass(item.status)"
                                                class="inline-flex items-center min-w-[84px] py-0.5 text-xs font-medium rounded-md border appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all duration-200">
                                            <option v-for="s in statuses" :key="s" :value="s">{{ s }}</option>
                                        </select>
                                    </div>
                                </div>
                            </td>
                            <td class="px-4 py-3 text-center align-middle">
                                <input
                                    type="date"
                                    v-model="item.arrival_date"
                                    @change="$root.updateItem(item.id, { arrival_date: item.arrival_date })"
                                    :class="!item.arrival_date ? 'text-transparent focus:text-slate-500' : 'text-slate-500'"
                                    class="w-full bg-transparent border-none focus:ring-0 p-0 text-xs text-center align-middle [&::-webkit-calendar-picker-indicator]:opacity-0 hover:[&::-webkit-calendar-picker-indicator]:opacity-100 transition-colors"
                                >
                            </td>
                            <td class="px-4 py-3 text-center align-middle">
                                <input
                                    type="date"
                                    v-model="item.distribution_date"
                                    @change="$root.updateItem(item.id, { distribution_date: item.distribution_date })"
                                    :class="!item.distribution_date ? 'text-transparent focus:text-slate-500' : 'text-slate-500'"
                                    class="w-full bg-transparent border-none focus:ring-0 p-0 text-xs text-center align-middle [&::-webkit-calendar-picker-indicator]:opacity-0 hover:[&::-webkit-calendar-picker-indicator]:opacity-100 transition-colors"
                                >
                            </td>
                            <td class="px-4 py-3 align-middle">
                                <div class="max-w-[180px] overflow-hidden text-ellipsis whitespace-nowrap" :title="item.signoff_note || ''">
                                    <input
                                        type="text"
                                        v-model="item.signoff_note"
                                        @blur="$root.updateItem(item.id, { signoff_note: item.signoff_note })"
                                        class="w-full px-2 py-1 text-sm text-slate-500 align-middle border rounded-sm bg-transparent border-transparent hover:border-slate-300 outline-none focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-all truncate"
                                        placeholder="签收备注"
                                    >
                                </div>
                            </td>
                            <td class="px-4 py-3 text-center align-middle">
                                <div class="flex items-center justify-center">
                                    <button @click="$root.toggleInvoice(item)"
                                            :class="item.invoice_issued ? 'bg-green-50 text-green-700 ring-1 ring-inset ring-green-600/20' : 'bg-yellow-50 text-yellow-800 ring-1 ring-inset ring-yellow-600/20'"
                                            class="inline-flex items-center justify-center whitespace-nowrap min-w-[64px] px-2 py-0.5 text-xs font-medium rounded-md transition-colors duration-200">
                                        <span v-if="!item.invoice_issued" class="relative flex h-1.5 w-1.5 mr-1">
                                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                                            <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-yellow-500"></span>
                                        </span>
                                        {{ item.invoice_issued ? '已入账' : '待报' }}
                                    </button>
                                </div>
                            </td>
                            <td class="px-4 py-3 text-center align-middle">
                                <div class="flex items-center justify-center">
                                    <div class="relative inline-flex items-center">
                                        <span v-if="item.payment_status === '未付款'" class="absolute left-1.5 flex h-1.5 w-1.5 pointer-events-none">
                                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                                            <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-amber-500"></span>
                                        </span>
                                        <select v-model="item.payment_status" @change="$root.updateItem(item.id, { payment_status: item.payment_status })"
                                                :class="{
                                                    'bg-yellow-50 text-yellow-800 ring-1 ring-inset ring-yellow-600/20 pl-4': item.payment_status === '未付款',
                                                    'bg-blue-50 text-blue-700 ring-1 ring-inset ring-blue-700/10 px-2': item.payment_status === '已付款',
                                                    'bg-green-50 text-green-700 ring-1 ring-inset ring-green-600/20 px-2': item.payment_status === '已报销',
                                                    'bg-slate-50 text-slate-700 ring-1 ring-inset ring-slate-600/20 px-2': item.payment_status !== '未付款' && item.payment_status !== '已付款' && item.payment_status !== '已报销'
                                                }"
                                                class="inline-flex items-center min-w-[84px] py-0.5 text-xs font-medium rounded-md border-0 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all duration-200">
                                            <option v-for="p in paymentStatuses" :key="p" :value="p">{{ p }}</option>
                                        </select>
                                    </div>
                                </div>
                            </td>
                            <td
                                :class="Number(item.id) === Number(focusedLedgerItemId) ? 'bg-amber-50' : selectedItemsModel.includes(item.id) ? 'bg-slate-100' : 'bg-white'"
                                class="ledger-table-sticky-action px-4 py-3 text-center align-middle sticky right-0 z-20 shadow-[-1px_0_0_0_#e2e8f0]"
                            >
                                <div class="flex items-center justify-center gap-1">
                                    <button @click="$root.openLedgerDetail(item)" class="text-slate-400 hover:text-blue-600 p-1 transition-colors duration-200" title="详情 / 审计轨迹"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></button>
                                    <button @click="$root.deleteItem(item.id)" class="text-slate-400 hover:text-red-600 p-1 transition-colors duration-200" title="删除"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div v-if="items.length > 0" class="ledger-mobile-list">
                    <article
                        v-for="item in items"
                        :key="`mobile-ledger-${item.id}`"
                        :data-ledger-item-id="item.id"
                        :class="{
                            'ledger-mobile-card-selected': selectedItemsModel.includes(item.id),
                            'ledger-mobile-card-focused': Number(item.id) === Number(focusedLedgerItemId),
                        }"
                        class="ledger-mobile-card"
                    >
                        <div class="ledger-mobile-card-header">
                            <label class="ledger-mobile-check" title="选择此记录">
                                <input type="checkbox" :value="item.id" v-model="selectedItemsModel" class="rounded text-blue-600 focus:ring-blue-500/40">
                            </label>
                            <div class="ledger-mobile-card-title">
                                <input
                                    type="text"
                                    v-model="item.item_name"
                                    @blur="$root.updateItem(item.id, { item_name: item.item_name })"
                                    class="ledger-mobile-name-input"
                                    placeholder="物品名称"
                                >
                                <div class="ledger-mobile-subtitle">
                                    <span>{{ item.serial_number || (item.id ? `REC-${item.id}` : '自动生成') }}</span>
                                    <span>{{ item.department || '未分配部门' }}</span>
                                </div>
                            </div>
                            <button @click="$root.openLedgerDetail(item)" class="ledger-mobile-icon-button" title="详情 / 审计轨迹">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>

                        <div class="ledger-mobile-status-row">
                            <select
                                :value="$root.normalizeProcurementStatus(item.status)"
                                @change="$root.handleLedgerStatusChange(item, $event.target.value)"
                                :class="$root.statusSelectClass(item.status)"
                                class="ledger-mobile-status-select"
                            >
                                <option v-for="s in statuses" :key="`mobile-status-${item.id}-${s}`" :value="s">{{ s }}</option>
                            </select>
                            <button
                                @click="$root.toggleInvoice(item)"
                                :class="item.invoice_issued ? 'bg-green-50 text-green-700 ring-1 ring-inset ring-green-600/20' : 'bg-yellow-50 text-yellow-800 ring-1 ring-inset ring-yellow-600/20'"
                                class="ledger-mobile-pill-button"
                            >
                                {{ item.invoice_issued ? '已入账' : '待报票' }}
                            </button>
                            <select
                                v-model="item.payment_status"
                                @change="$root.updateItem(item.id, { payment_status: item.payment_status })"
                                class="ledger-mobile-payment-select"
                            >
                                <option v-for="p in paymentStatuses" :key="`mobile-payment-${item.id}-${p}`" :value="p">{{ p }}</option>
                            </select>
                        </div>

                        <div class="ledger-mobile-field-grid">
                            <label class="ledger-mobile-field">
                                <span>部门</span>
                                <input
                                    type="text"
                                    v-model="item.department"
                                    @blur="$root.updateItem(item.id, { department: item.department })"
                                    placeholder="部门"
                                >
                            </label>
                            <label class="ledger-mobile-field">
                                <span>经办人</span>
                                <input
                                    type="text"
                                    v-model="item.handler"
                                    @blur="$root.updateItem(item.id, { handler: item.handler })"
                                    placeholder="经办人"
                                >
                            </label>
                            <label class="ledger-mobile-field">
                                <span>数量</span>
                                <input
                                    type="number"
                                    v-model.number="item.quantity"
                                    @blur="$root.updateItem(item.id, { quantity: item.quantity })"
                                    inputmode="decimal"
                                >
                            </label>
                            <label class="ledger-mobile-field">
                                <span>单价</span>
                                <input
                                    type="number"
                                    step="0.01"
                                    v-model.number="item.unit_price"
                                    @blur="$root.updateItem(item.id, { unit_price: item.unit_price })"
                                    inputmode="decimal"
                                    placeholder="-"
                                >
                            </label>
                            <label class="ledger-mobile-field">
                                <span>到货</span>
                                <input
                                    type="date"
                                    v-model="item.arrival_date"
                                    @change="$root.updateItem(item.id, { arrival_date: item.arrival_date })"
                                >
                            </label>
                            <label class="ledger-mobile-field">
                                <span>分发</span>
                                <input
                                    type="date"
                                    v-model="item.distribution_date"
                                    @change="$root.updateItem(item.id, { distribution_date: item.distribution_date })"
                                >
                            </label>
                        </div>

                        <label class="ledger-mobile-field ledger-mobile-field-wide">
                            <span>签收备注</span>
                            <input
                                type="text"
                                v-model="item.signoff_note"
                                @blur="$root.updateItem(item.id, { signoff_note: item.signoff_note })"
                                placeholder="签收备注"
                            >
                        </label>

                        <label class="ledger-mobile-field ledger-mobile-field-wide">
                            <span>采购链接</span>
                            <input
                                type="url"
                                v-model="item.purchase_link"
                                @blur="$root.updateItem(item.id, { purchase_link: item.purchase_link })"
                                placeholder="采购链接"
                            >
                        </label>

                        <div class="ledger-mobile-card-actions">
                            <button
                                v-if="item.purchase_link"
                                @click="$root.copyPurchaseLink(item.purchase_link)"
                                type="button"
                                class="ledger-mobile-action-button"
                            >
                                复制链接
                            </button>
                            <a
                                v-if="item.purchase_link"
                                :href="item.purchase_link"
                                target="_blank"
                                class="ledger-mobile-action-button"
                            >
                                打开链接
                            </a>
                            <button
                                @click="$root.deleteItem(item.id)"
                                type="button"
                                class="ledger-mobile-action-button ledger-mobile-action-danger"
                            >
                                删除
                            </button>
                        </div>
                    </article>
                </div>
                <div v-if="items.length === 0" class="ledger-empty-state flex flex-col items-center justify-center py-24 px-6 text-center">
                    <div class="inline-flex h-14 w-14 items-center justify-center rounded-xl bg-slate-100 text-slate-400">
                        <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 7.5A2.5 2.5 0 015.5 5h13A2.5 2.5 0 0121 7.5v9A2.5 2.5 0 0118.5 19h-13A2.5 2.5 0 013 16.5v-9zM8 9h8M8 12h8M8 15h5"/>
                        </svg>
                    </div>
                    <p class="mt-4 text-base font-semibold text-slate-700">暂无采购数据</p>
                    <p class="mt-1 text-sm text-slate-500">请点击上方“手动新增”或“导入单据”开始录入</p>
                </div>
            </div>

            <div class="ledger-table-footer p-4 bg-slate-50 border-t border-slate-200 flex flex-col lg:flex-row items-start lg:items-center gap-3 lg:gap-4 justify-between">
                <div class="ledger-table-footer-copy text-xs text-slate-600">
                    显示 <span class="font-semibold text-slate-900">{{ pageRangeStart }}</span>-<span class="font-semibold text-slate-900">{{ pageRangeEnd }}</span> / <span class="font-semibold text-slate-900">{{ totalItems }}</span> 条
                </div>
                <div class="ledger-pagination flex items-center gap-2 flex-wrap">
                    <label class="text-xs text-slate-500">每页</label>
                    <select v-model.number="pageSizeModel" @change="$root.changePageSize()" class="ledger-pagination-control h-9 px-2 bg-white border border-slate-300 rounded-lg text-xs font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20">
                        <option v-for="size in pageSizeOptions" :key="`size-${size}`" :value="size">{{ size }}</option>
                    </select>
                    <div class="w-px h-5 bg-slate-300 mx-1"></div>
                    <button @click="$root.goToPage(currentPage - 1)" :disabled="currentPage <= 1" class="ledger-pagination-button h-9 px-3 bg-white border border-slate-300 rounded-lg text-xs font-medium text-slate-700 disabled:opacity-50 hover:bg-slate-50 transition-colors duration-200">上一页</button>
                    <template v-for="(token, idx) in pageTokens" :key="`pt-${idx}-${token}`">
                        <span v-if="token === 'ellipsis'" class="h-9 px-2 inline-flex items-center text-slate-400">…</span>
                        <button v-else @click="$root.goToPage(token)" :class="token === currentPage ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50'" class="ledger-pagination-button h-9 min-w-[36px] px-2 border rounded-lg text-xs font-medium transition-colors duration-200">{{ token }}</button>
                    </template>
                    <button @click="$root.goToPage(currentPage + 1)" :disabled="currentPage >= totalPages" class="ledger-pagination-button h-9 px-3 bg-white border border-slate-300 rounded-lg text-xs font-medium text-slate-700 disabled:opacity-50 hover:bg-slate-50 transition-colors duration-200">下一页</button>
                    <div class="w-px h-5 bg-slate-300 mx-1"></div>
                    <input v-model.number="jumpPageModel" @keyup.enter="$root.jumpToPage()" type="number" min="1" :max="totalPages" class="ledger-pagination-control h-9 w-20 px-2 bg-white border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="页码">
                    <button @click="$root.jumpToPage()" class="ledger-pagination-button h-9 px-3 bg-white border border-slate-300 rounded-lg text-xs font-medium text-slate-700 hover:bg-slate-50 transition-colors duration-200">跳转</button>
                </div>
            </div>
        </div>
    </template>
    
    <script src="/static/view-config.js?v=1.2.49"></script>
    <script src="/static/time-utils.js?v=1.2.49"></script>
    <script src="/static/state.js?v=1.2.49"></script>
    <script src="/static/operations-center-api.js?v=1.2.49"></script>
    <script src="/static/api.js?v=1.2.49"></script>
    <script src="/static/ledger-filter-panel.js?v=1.2.49"></script>
    <script src="/static/ledger-batch-toolbar.js?v=1.2.49"></script>
    <script src="/static/ledger-table-panel.js?v=1.2.49"></script>
    <script src="/static/ledger-detail-modal.js?v=1.2.49"></script>
    <script src="/static/ledger-add-modal.js?v=1.2.49"></script>
    <script src="/static/ops-panel-mixin.js?v=1.2.49"></script>
    <script src="/static/ops-overview-panel.js?v=1.2.49"></script>
    <script src="/static/ops-procurement-panel.js?v=1.2.49"></script>
    <script src="/static/ops-master-data-panel.js?v=1.2.49"></script>
    <script src="/static/ops-exceptions-panel.js?v=1.2.49"></script>
    <script src="/static/settings-operations-panel.js?v=1.2.49"></script>
    <script src="/static/settings-ai-panel.js?v=1.2.49"></script>
    <script src="/static/settings-backup-panel.js?v=1.2.49"></script>
    <script src="/static/settings-maintenance-panel.js?v=1.2.49"></script>
    <script src="/static/webdav-modal.js?v=1.2.49"></script>
    <script src="/static/audit-log-panel.js?v=1.2.49"></script>
    <script src="/static/recycle-bin-modal.js?v=1.2.49"></script>
    <script src="/static/data-quality-modal.js?v=1.2.49"></script>
    <script src="/static/import-preview-modal.js?v=1.2.49"></script>
    <script src="/static/duplicate-modal.js?v=1.2.49"></script>
    <script src="/static/ui.js?v=1.2.49"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const app = document.getElementById('app');
                if (app) app.style.display = 'flex';
            }, 200);
        });
    </script>
</body>
</html>
