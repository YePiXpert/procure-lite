services:
  procure-lite:
    image: ghcr.io/yepixpert/procure-lite:latest
    build:
      context: .
    container_name: procure-lite
    restart: unless-stopped
    ports:
      - "${PROCURE_LITE_PORT:-8000}:8000"
    environment:
      PROCURE_LITE_STATE_DIR: /app/state
      PROCURE_LITE_AUTH_COOKIE_SECURE: ${PROCURE_LITE_AUTH_COOKIE_SECURE:-auto}
    volumes:
      - ./procure-lite-state:/app/state
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/app/metadata', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
