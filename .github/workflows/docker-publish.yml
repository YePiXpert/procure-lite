name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate project
        run: python scripts/validate_project.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: prep
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER:-${GITHUB_REPOSITORY%%/*}}"
          OWNER="$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/office-supplies-tracker"
          TAGS="${IMAGE}:latest\n${IMAGE}:sha-${GITHUB_SHA}"

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            TAGS="${TAGS}\n${IMAGE}:${{ github.event.release.tag_name }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS}\n${IMAGE}:${GITHUB_REF_NAME}"
          fi

          {
            echo "tags<<EOF"
            printf "%b\n" "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.prep.outputs.tags }}
